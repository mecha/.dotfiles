set -g default-command "zsh"
set -g default-terminal "${TERM}"
set -g detach-on-destroy off
set -ga terminal-overrides ",screen-256color:Tc"
set -g repeat-time 500
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g mouse on
setw -g mode-keys vi

set -g @theme-primary "${VIRID_BRIGHT_MINT}"
set -g @theme-fg "${VIRID_FG}"
set -g @theme-dim "${VIRID_DIM}"
set -g @theme-dark "${VIRID_DARK}"

set -g status-position bottom
set -g status-left-length 50
set -g status-fg "${VIRID_FG}"
set -g status-bg "${VIRID_DARK}"
set -g status-left "#[bold][#S]#{?client_prefix,*, }"
set -g window-status-format "  #[fg=#{@theme-dim}]#I:[#{?pane_in_mode,[#{pane_mode}],#W}]"
set -g window-status-current-format "  #[fg=#{@theme-primary}]#I:[#{?pane_in_mode,[#{pane_mode}],#W}]"
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,} %a %d %b %Y  %H:%M"
set -g status-interval 5
set -g pane-active-border-style "fg=#{@theme-primary}"
set -g mode-style "fg=black,bg=#{@theme-primary}"
set -g message-style "fg=black,bg=#{@theme-primary}"
set -g clock-mode-colour "${VIRID_BRIGHT_MINT}"
set -g popup-style "bg=#{@theme-dark}"
set -g popup-border-style "fg=${VIRID_MINT},bg=${VIRID_DARK}"
set -g popup-border-line "rounded"
set -g menu-style "fg=#{@theme-fg},bg=#{@theme-dark}"
set -g menu-border-style "fg=${VIRID_MINT},bg=#{@theme-dark}"
set -g menu-border-line "rounded"
set -g menu-selected-style "fg=#{@theme-dark},bg=${VIRID_MINT}"

# Undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

#------------------------------------------------------------------------------
# Key binds
#------------------------------------------------------------------------------

unbind -n M-h
unbind -n M-t
unbind -n M-s
unbind -n M-n
unbind -n M-r
unbind -n M-m
unbind -n M-f
unbind -n M-p

set -g prefix C-a
bind C-a send-keys C-a

# open new window
bind -n M-c run "tmux new-window"

# close windows and panes
bind -r q confirm-before -c "q" "kill-pane"
bind -n M-q confirm-before -c "q" "kill-pane"
bind -r Q confirm-before -c "q" "kill-window"
bind -n M-Q confirm-before -c "q" "kill-window"

# spit window
bind -r h split-window -h
bind -r v split-window -v

# switch to window by number
bind -n M-1 run "tmux select-window -t 1 || tmux display-message -d 1000 'no window at position 1'"
bind -n M-2 run "tmux select-window -t 2 || tmux display-message -d 1000 'no window at position 2'"
bind -n M-3 run "tmux select-window -t 3 || tmux display-message -d 1000 'no window at position 3'"
bind -n M-4 run "tmux select-window -t 4 || tmux display-message -d 1000 'no window at position 4'"
bind -n M-5 run "tmux select-window -t 5 || tmux display-message -d 1000 'no window at position 5'"
bind -n M-6 run "tmux select-window -t 6 || tmux display-message -d 1000 'no window at position 6'"
bind -n M-7 run "tmux select-window -t 7 || tmux display-message -d 1000 'no window at position 7'"
bind -n M-8 run "tmux select-window -t 8 || tmux display-message -d 1000 'no window at position 8'"
bind -n M-9 run "tmux select-window -t 9 || tmux display-message -d 1000 'no window at position 9'"
bind -n M-0 run "tmux select-window -t 10 || tmux display-message -d 1000 'no window at position 10'"

# next and previous window
bind -r M-n run "tmux select-window -n"
bind -r M-p run "tmux select-window -p"

# last window
bind l select-window -l
bind -n M-l select-window -l

# last session
bind b switch-client -l
bind -n M-b switch-client -l

# open project
bind Space display-popup -w 50 -h 65% -T " Open project " -EE "project open"
bind -n M-Space display-popup -w 50 -h 65% -T " Open project " -EE "project open"

# open editor
bind -n M-e run "tmux select-window -t nvim || tmux new-window -at 1 nvim"

# open file in editor
bind Enter display-popup -w 80% -h 80% -T " Edit file " -EE "project edit-file"
bind -n M-Enter display-popup -w 80% -h 80% -T " Edit file " -EE "project edit-file"

# open git
bind -n M-g run "tmux select-window -t git || tmux new-window -n git lazygit"

# open agent
bind -n M-a run "tmux select-window -t opencode || tmux new-window -n opencode opencode"

# show global menu
bind m run globalmenu
bind -n M-m run globalmenu

# swap panes
bind -r '{' swap-pane -U
bind -r '}' swap-pane -D

# show pane numbers
bind -r P display-panes

# sync input between panes
bind y setw synchronize-panes \; display-message -d 1000 "toggled synchronized panes"

#------------------------------------------------------------------------------
# Plugins
#------------------------------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_left "C-Left"
set -g @vim_navigator_mapping_right "C-Right"
set -g @vim_navigator_mapping_up "C-Up"
set -g @vim_navigator_mapping_down "C-Down"
unbind -n C-\\

run '~/.local/share/tmux/plugins/tpm/tpm'
