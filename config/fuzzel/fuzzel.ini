# output=<not set>
font=JetBrainsMono Nerd Font Mono:size=11,Noto Color Emoji:size=11
# dpi-aware=auto
use-bold=yes
# message=
# message-mode=wrap
prompt="> "
placeholder=Search
# icon-theme=default
icons-enabled=yes
# hide-before-typing=no
# fields=filename,name,generic
# password-character=*
# filter-desktop=no
match-mode=fzf
sort-result=yes
match-counter=yes
# delayed-filter-ms=300
# delayed-filter-limit=20000
# show-actions=no
# terminal=$TERMINAL -e  # Note: you cannot actually use environment variables here
# launch-prefix=<not set>
# list-executables-in-path=no

# anchor=center
# x-margin=0
# y-margin=0
# minimal-lines=no
width=56
lines=15
# tabs=8
horizontal-pad=8
vertical-pad=6
inner-pad=12

# scaling-filter=box
# image-size-ratio=0.5

# gamma-correct-blending=no
line-height=26
# letter-spacing=0

# layer=overlay
# keyboard-focus=exclusive
exit-on-keyboard-focus-loss=no

# cache=<not set>

# render-workers=<number of logical CPUs>
# match-workers=<number of logical CPUs>

# enable-mouse=yes

[colors]
background=232828ff
text=e9f5dbff
message=84a98cff
prompt=84a98cff
input=e9f5dbff
match=e85362ff
selection=2c3333ff
selection-text=95d5b2ff
selection-match=e85362ff
placeholder=48534aff
counter=48534aff
border=84a98cff

[border]
width=2
radius=8

[dmenu]
# mode=text  # text|index
# exit-immediately-if-empty=no

[key-bindings]
# cancel=Escape Control+g Control+c Control+bracketleft
# execute=Return KP_Enter Control+y
# execute-or-next=Tab
# execute-input=Shift+Return Shift+KP_Enter
# cursor-left=Left Control+b
# cursor-left-word=Control+Left Mod1+b
# cursor-right=Right Control+f
# cursor-right-word=Control+Right Mod1+f
# cursor-home=Home Control+a
# cursor-end=End Control+e
# delete-line=Control+Shift+BackSpace
# delete-prev=BackSpace Control+h
# delete-prev-word=Mod1+BackSpace Control+BackSpace Control+w
delete-line-backward=Control+Shift+w
delete-next=Delete KP_Delete
# delete-next-word=Mod1+d Control+Delete Control+KP_Delete
# delete-line-forward=Control+k
# prev=Up Control+p
# prev-with-wrap=ISO_Left_Tab
# next=Down Control+n
# next-with-wrap=none
prev-page=Control+u
next-page=Control+d
# expunge=Shift+Delete
# clipboard-paste=Control+v XF86Paste
# primary-paste=Shift+Insert Shift+KP_Insert
first=Control+comma
last=Control+period

# custom-N: *dmenu mode only*. Like execute, but with a non-zero
# exit-code; custom-1 exits with code 10, custom-2 with 11, custom-3
# with 12, and so on.

# custom-1=Mod1+1
# custom-2=Mod1+2
# custom-3=Mod1+3
# custom-4=Mod1+4
# custom-5=Mod1+5
# custom-6=Mod1+6
# custom-7=Mod1+7
# custom-8=Mod1+8
# custom-9=Mod1+9
# custom-10=Mod1+0
# custom-11=Mod1+exclam
# custom-12=Mod1+at
# custom-13=Mod1+numbersign
# custom-14=Mod1+dollar
# custom-15=Mod1+percent
# custom-16=Mod1+dead_circumflex
# custom-17=Mod1+ampersand
# custom-18=Mod1+asterix
# custom-19=Mod1+parentleft
